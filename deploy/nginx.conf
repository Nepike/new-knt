# Тестовый сайт рядом с основным: /etc/nginx/sites-available/test.inbicst.ru,
# symlink в sites-enabled, затем `certbot --nginx -d test.inbicst.ru` (допишет 443 + редирект).
# server_name точечно ловит test.inbicst.ru — блоки default и knt-website не мешают.
server {
    server_name test.inbicst.ru;

    # Стоп-гэп до R2 (M2): мультигиговые файлы гнать через приложение не стоит.
    client_max_body_size 500M;
    proxy_request_buffering off;   # большие загрузки стримить в gunicorn, не буферить на диск

    location = /favicon.ico { access_log off; log_not_found off; }

    location /media/ {
        alias /srv/test-knt/media/;   # = ./media из docker-compose на этом сервере
        expires max;
        add_header Cache-Control "public";
    }

    # Статику отдаёт whitenoise внутри контейнера — location /static/ не нужен.

    location / {
        proxy_pass http://127.0.0.1:8001;   # хост-порт web-контейнера
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;   # для SECURE_PROXY_SSL_HEADER
        proxy_redirect off;
    }

    listen 80;
}
