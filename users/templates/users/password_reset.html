{% extends "core/base.html" %}

{% block title %}Сброс пароля{% endblock %}

{% block content %}
<div class="w-full max-w-md m-auto">
  <h1 class="text-2xl font-bold mb-3 text-center">Сброс пароля</h1>
  <p class="text-sm text-slate-500 dark:text-slate-400 text-center mb-8">Укажи свой email — пришлём ссылку для установки нового пароля.</p>

  <form method="post" class="space-y-6">
    {% csrf_token %}
    {% include "core/inputs.html" with field=form.email %}
    <button type="submit" class="btn btn-primary w-full">Отправить ссылку</button>
  </form>

  <p class="mt-6 text-center text-sm"><a href="{% url 'login' %}" class="text-accent hover:underline">Вернуться ко входу</a></p>
</div>
{% endblock %}
